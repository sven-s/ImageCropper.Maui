name: Publish to NuGet

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.3.0)'
        required: true

env:
  VERSION: ${{ github.ref_name || github.event.inputs.version }}

jobs:
  publish:
    runs-on: macos-latest
    environment: nuget
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build
        run: dotnet build ImageCropper.Maui.sln -c Release -p:ValidateXcodeVersion=false

      - name: Pack
        run: |
          dotnet pack Com.Vanniktech.AndroidImageCropper.Maui/Com.Vanniktech.AndroidImageCropper.Maui.csproj -c Release --no-build -p:Version=${{ env.VERSION }}
          dotnet pack TOCropView.Maui/TOCropView.Maui.csproj -c Release --no-build -p:Version=${{ env.VERSION }}
          dotnet pack ImageCropper.Maui/ImageCropper.Maui.csproj -c Release --no-build -p:Version=${{ env.VERSION }}

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: |
          dotnet nuget push "Com.Vanniktech.AndroidImageCropper.Maui/bin/Release/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          dotnet nuget push "TOCropView.Maui/bin/Release/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          dotnet nuget push "ImageCropper.Maui/bin/Release/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
